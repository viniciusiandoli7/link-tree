<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dra. Mariana Carmona</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500;600&family=Bodoni+Moda:opsz,wght@6..96,400;6..96,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #b89a5a;
    --gold-light: #d4b96a;
    --gold-bright: #f0d080;
    --black: #000000;
    --black-soft: #0a0a0a;
  }

  body {
    background: var(--black);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Montserrat', sans-serif;
    overflow-x: hidden;
    position: relative;
  }

  /* ── Particle canvas ── */
  #particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Card ── */
  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    padding: 48px 28px 56px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* ── Avatar ── */
  .avatar-wrap {
    position: relative;
    width: 148px;
    height: 148px;
    margin-bottom: 28px;
  }
  .avatar-wrap::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: conic-gradient(var(--gold-bright), var(--gold), #6b5120, var(--gold-bright));
    animation: spin 6s linear infinite;
  }
  .avatar-wrap::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    background: var(--black);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .avatar {
    position: relative;
    z-index: 1;
    width: 148px;
    height: 148px;
    border-radius: 50%;
    object-fit: cover;
    object-position: top center;
    display: block;
  }

  /* ── Name ── */
  .name {
    font-family: 'Bodoni Moda', serif;
    font-weight: 400;
    font-size: clamp(1.5rem, 5.5vw, 2rem);
    letter-spacing: 0.12em;
    color: #ffffff;
    text-align: center;
    text-transform: uppercase;
    margin-bottom: 6px;
    line-height: 1.2;
  }

  .crbm {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* ── Tagline ── */
  .tagline-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .tagline-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--gold);
    flex-shrink: 0;
  }
  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.15rem;
    color: var(--gold-light);
    letter-spacing: 0.04em;
  }

  /* ── Welcome ── */
  .welcome {
    font-size: 0.9rem;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: 0.05em;
    margin-bottom: 36px;
  }

  /* ── Buttons ── */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 18px 24px;
    border-radius: 50px;
    background: linear-gradient(135deg, #9e8240 0%, #c8a84b 40%, #a8873a 70%, #8a6e2e 100%);
    color: #000;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-align: center;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    transition: transform 0.22s ease, box-shadow 0.22s ease;
    box-shadow: 0 2px 20px rgba(184,154,90,0.25);
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 60%);
    border-radius: inherit;
    pointer-events: none;
  }
  .btn:hover {
    transform: translateY(-2px) scale(1.015);
    box-shadow: 0 6px 32px rgba(184,154,90,0.45);
  }
  .btn:active { transform: scale(0.98); }

  /* ── Footer ── */
  .footer {
    margin-top: 40px;
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.18);
    text-transform: uppercase;
  }

  /* ══════════════════════════════════
     RESPONSIVE — todos os dispositivos
  ══════════════════════════════════ */

  /* Celulares pequenos (até 360px) */
  @media (max-width: 360px) {
    .card { padding: 36px 18px 44px; }
    .avatar-wrap { width: 118px; height: 118px; }
    .avatar { width: 118px; height: 118px; }
    .name { font-size: 1.25rem; letter-spacing: 0.08em; }
    .tagline { font-size: 0.95rem; }
    .btn { font-size: 0.6rem; padding: 15px 18px; letter-spacing: 0.14em; }
    .links { gap: 13px; }
  }

  /* Celulares médios (361px – 480px) */
  @media (min-width: 361px) and (max-width: 480px) {
    .card { padding: 40px 22px 50px; }
    .avatar-wrap { width: 132px; height: 132px; }
    .avatar { width: 132px; height: 132px; }
    .name { font-size: clamp(1.35rem, 5vw, 1.65rem); }
    .btn { font-size: 0.65rem; padding: 16px 20px; }
  }

  /* Celulares grandes / landscape (481px – 600px) */
  @media (min-width: 481px) and (max-width: 600px) {
    .card { max-width: 520px; padding: 44px 28px 52px; }
    .avatar-wrap { width: 140px; height: 140px; }
    .avatar { width: 140px; height: 140px; }
  }

  /* Tablets portrait (601px – 768px) */
  @media (min-width: 601px) and (max-width: 768px) {
    .card { max-width: 560px; padding: 52px 40px 60px; }
    .avatar-wrap { width: 160px; height: 160px; }
    .avatar { width: 160px; height: 160px; }
    .name { font-size: 2rem; }
    .tagline { font-size: 1.2rem; }
    .btn { font-size: 0.72rem; padding: 20px 28px; }
    .links { gap: 18px; }
  }

  /* Tablets landscape / iPad (769px – 1024px) */
  @media (min-width: 769px) and (max-width: 1024px) {
    .card { max-width: 580px; padding: 56px 48px 64px; }
    .avatar-wrap { width: 172px; height: 172px; }
    .avatar { width: 172px; height: 172px; }
    .name { font-size: 2.1rem; }
    .tagline { font-size: 1.25rem; }
    .btn { font-size: 0.75rem; padding: 21px 30px; }
    .links { gap: 20px; }
    .welcome { margin-bottom: 42px; }
  }

  /* Desktops e monitores grandes (1025px+) */
  @media (min-width: 1025px) {
    .card { max-width: 600px; padding: 60px 56px 72px; }
    .avatar-wrap { width: 180px; height: 180px; }
    .avatar { width: 180px; height: 180px; }
    .name { font-size: 2.2rem; }
    .tagline { font-size: 1.3rem; }
    .btn {
      font-size: 0.76rem;
      padding: 22px 32px;
      cursor: pointer;
    }
    .links { gap: 20px; }
    .welcome { margin-bottom: 44px; }
  }

  /* Landscape em celulares (altura pequena) */
  @media (max-height: 500px) and (orientation: landscape) {
    .card { padding: 24px 28px 32px; }
    .avatar-wrap { width: 100px; height: 100px; margin-bottom: 16px; }
    .avatar { width: 100px; height: 100px; }
    .welcome { margin-bottom: 20px; }
    .links { gap: 10px; }
    .btn { padding: 13px 20px; font-size: 0.62rem; }
    .footer { margin-top: 24px; }
  }

  /* Telas de alta resolução (Retina / 4K) */
  @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
    .avatar { image-rendering: -webkit-optimize-contrast; }
  }
</style>
</head>

<script>
// ── Gold particle system ──
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const COLORS = ['#f0d080','#d4b96a','#b89a5a','#fff8dc','#c8a84b','#fffacd'];

function rand(a, b) { return a + Math.random() * (b - a); }

function createParticle() {
  return {
    x: rand(0, W),
    y: rand(0, H),
    r: rand(0.5, 2.5),
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    alpha: rand(0.1, 0.9),
    vx: rand(-0.15, 0.15),
    vy: rand(-0.4, -0.05),
    life: rand(80, 220),
    age: 0,
    twinkle: rand(0, Math.PI * 2),
    twinkleSpeed: rand(0.02, 0.07)
  };
}

for (let i = 0; i < 120; i++) particles.push(createParticle());

function animate() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach((p, i) => {
    p.age++;
    p.x += p.vx;
    p.y += p.vy;
    p.twinkle += p.twinkleSpeed;
    const fade = p.age < 20 ? p.age / 20 : p.age > p.life - 20 ? (p.life - p.age) / 20 : 1;
    const alpha = p.alpha * fade * (0.6 + 0.4 * Math.sin(p.twinkle));
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha;
    ctx.fill();
    if (p.age >= p.life) particles[i] = createParticle();
  });
  ctx.globalAlpha = 1;
  requestAnimationFrame(animate);
}
animate();
</script>
