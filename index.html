<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#5A1F2B" />
  <meta name="description" content="Links oficiais da Dra. Mariana Thomaz Carmona — estética premium, rejuvenescimento natural e planejamento facial." />
  <title>Dra. Mariana Thomaz Carmona</title>

  <link rel="icon" href="assets/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon-180.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #5A1F2B;
      --primary-dark: #3F1620;
      --background: #F7F2EA;
      --secondary-background: #D8C4AE;
      --text-primary: #5B3A2E;
      --text-strong: #1E1A18;
      --border: rgba(90, 31, 43, .12);
      --hover: rgba(90, 31, 43, .08);
      --surface: rgba(250, 247, 241, .84);
      --surface-strong: #FDF8F1;
      --shadow: 0 30px 80px rgba(63, 22, 32, .15);
      --soft-shadow: 0 16px 36px rgba(63, 22, 32, .10);
      --transition: 260ms cubic-bezier(.2, .8, .2, 1);
    }

    html { min-height: 100%; scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(18px, 4vw, 46px) 16px;
      font-family: 'Montserrat', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text-primary);
      background:
        radial-gradient(circle at 18% 12%, rgba(90, 31, 43, .12), transparent 29%),
        radial-gradient(circle at 86% 8%, rgba(216, 196, 174, .58), transparent 34%),
        radial-gradient(circle at 50% 100%, rgba(90, 31, 43, .10), transparent 36%),
        var(--background);
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(90,31,43,.13) 0.7px, transparent 0.7px);
      background-size: 18px 18px;
      opacity: .22;
      mask-image: linear-gradient(to bottom, #000, transparent 90%);
    }

    body::after {
      content: '';
      position: fixed;
      width: 72vmax;
      height: 72vmax;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      border-radius: 999px;
      background:
        radial-gradient(circle at 35% 35%, rgba(90,31,43,.15), transparent 30%),
        radial-gradient(circle at 65% 40%, rgba(216,196,174,.42), transparent 34%),
        radial-gradient(circle at 50% 72%, rgba(90,31,43,.08), transparent 38%);
      filter: blur(18px);
      opacity: .76;
      animation: ambientWine 15s ease-in-out infinite alternate;
      z-index: 0;
    }

    .shell {
      position: relative;
      width: min(100%, 460px);
      z-index: 1;
    }

    .card {
      position: relative;
      width: 100%;
      padding: 26px 22px 22px;
      border: 1px solid var(--border);
      border-radius: 34px;
      background: linear-gradient(180deg, rgba(253, 248, 241, .94), rgba(247, 242, 234, .80));
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(22px);
      animation: cardEntrance 780ms cubic-bezier(.2, .8, .2, 1) both;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(145deg, rgba(253,248,241,.56), transparent 35%),
        radial-gradient(circle at 100% 0%, rgba(90,31,43,.11), transparent 36%);
      pointer-events: none;
    }

    .card::after {
      content: '';
      position: absolute;
      inset: -40% -32% auto auto;
      width: 260px;
      height: 260px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(90,31,43,.11), transparent 66%);
      animation: slowPulse 5.8s ease-in-out infinite;
      pointer-events: none;
    }

    .inner { position: relative; z-index: 1; }

    .logo-area {
      position: relative;
      display: flex;
      justify-content: center;
      padding: 6px 8px 22px;
      animation: fadeDown 720ms ease both;
    }

    .logo-area::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: 10px;
      width: min(46%, 180px);
      height: 1px;
      transform: translateX(-50%) scaleX(0);
      transform-origin: center;
      background: linear-gradient(90deg, transparent, rgba(90,31,43,.42), transparent);
      animation: drawLine 900ms 420ms ease both;
    }

    .logo {
      width: min(86%, 310px);
      height: auto;
      display: block;
      filter: drop-shadow(0 12px 22px rgba(90, 31, 43, .08));
    }

    .profile-card {
      position: relative;
      display: grid;
      grid-template-columns: 108px 1fr;
      gap: 17px;
      align-items: center;
      padding: 14px;
      margin-bottom: 20px;
      border-radius: 28px;
      background: rgba(253, 248, 241, .70);
      border: 1px solid rgba(90,31,43,.10);
      box-shadow: var(--soft-shadow);
      overflow: hidden;
      animation: fadeUp 720ms 120ms ease both;
    }

    .profile-card::before {
      content: '';
      position: absolute;
      width: 180px;
      height: 180px;
      left: -26px;
      top: 50%;
      transform: translateY(-50%);
      border-radius: 999px;
      background: radial-gradient(circle, rgba(90,31,43,.16), rgba(90,31,43,.04) 48%, transparent 70%);
      animation: haloBreath 4.8s ease-in-out infinite;
      pointer-events: none;
    }

    .portrait-wrap {
      position: relative;
      width: 108px;
      height: 128px;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(90,31,43,.18);
      background: var(--secondary-background);
      z-index: 1;
      box-shadow: 0 14px 32px rgba(63,22,32,.14);
    }

    .portrait-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 0 1px rgba(253,248,241,.34);
      border-radius: inherit;
      pointer-events: none;
    }

    .portrait {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      transform: scale(1.01);
      transition: transform 900ms ease;
    }

    .profile-card:hover .portrait { transform: scale(1.045); }

    .profile-copy { position: relative; z-index: 1; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: .62rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--primary);
    }

    .eyebrow::before {
      content: '';
      width: 22px;
      height: 1px;
      background: rgba(90,31,43,.34);
    }

    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2.05rem, 8vw, 2.75rem);
      font-weight: 500;
      line-height: .94;
      letter-spacing: -.03em;
      color: var(--text-strong);
      margin-bottom: 10px;
    }

    .crbm {
      font-size: .62rem;
      font-weight: 700;
      color: rgba(91,58,46,.70);
      letter-spacing: .22em;
      text-transform: uppercase;
    }

    .tagline {
      margin: 4px auto 23px;
      max-width: 350px;
      text-align: center;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(1.24rem, 4vw, 1.48rem);
      line-height: 1.22;
      color: var(--primary-dark);
      animation: fadeUp 720ms 220ms ease both;
    }

    .tagline strong {
      font-weight: 600;
      color: var(--primary);
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      position: relative;
      display: grid;
      grid-template-columns: 42px 1fr auto;
      align-items: center;
      gap: 12px;
      width: 100%;
      min-height: 64px;
      padding: 11px 16px 11px 12px;
      border: 1px solid rgba(90,31,43,.13);
      border-radius: 23px;
      background: rgba(253, 248, 241, .76);
      color: var(--text-strong);
      text-decoration: none;
      box-shadow: 0 12px 24px rgba(63,22,32,.07);
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition), background var(--transition);
      overflow: hidden;
      isolation: isolate;
      animation: fadeUp 660ms ease both;
    }

    .links .btn:nth-child(1) { animation-delay: 320ms; }
    .links .btn:nth-child(2) { animation-delay: 430ms; }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(90,31,43,.05) 45%, transparent 70%);
      opacity: 0;
      transition: opacity var(--transition);
      pointer-events: none;
      z-index: -1;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: rgba(253, 248, 241, .96);
      border-color: rgba(90,31,43,.24);
      box-shadow: 0 18px 34px rgba(63,22,32,.12);
    }

    .btn:hover::after { opacity: 1; }

    .btn:focus-visible {
      outline: 3px solid rgba(90,31,43,.22);
      outline-offset: 3px;
    }

    .btn:active { transform: translateY(0) scale(.99); }

    .btn.primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--background);
      border-color: transparent;
      box-shadow: 0 18px 40px rgba(90,31,43,.26);
    }

    .btn.primary::before {
      content: '';
      position: absolute;
      top: -30%;
      bottom: -30%;
      width: 42%;
      left: -55%;
      transform: skewX(-22deg);
      background: linear-gradient(90deg, transparent, rgba(247,242,234,.28), transparent);
      animation: buttonSheen 5.8s ease-in-out infinite;
      pointer-events: none;
    }

    .btn.primary:hover {
      box-shadow:
        0 22px 48px rgba(90,31,43,.32),
        0 0 0 6px rgba(90,31,43,.055);
    }

    .icon {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: rgba(90,31,43,.08);
      color: var(--primary);
      font-size: 1.05rem;
      flex-shrink: 0;
      transition: transform var(--transition), background var(--transition);
    }

    .btn:hover .icon { transform: scale(1.035); }

    .primary .icon {
      background: rgba(247,242,234,.14);
      color: var(--background);
    }

    .btn-copy { min-width: 0; }

    .btn-title {
      display: block;
      font-size: .74rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      line-height: 1.2;
    }

    .btn-subtitle {
      display: block;
      margin-top: 4px;
      font-size: .76rem;
      font-weight: 500;
      color: rgba(91,58,46,.72);
      line-height: 1.2;
    }

    .primary .btn-subtitle { color: rgba(247,242,234,.76); }

    .arrow {
      color: rgba(90,31,43,.48);
      font-size: 1.05rem;
      transition: transform var(--transition), color var(--transition);
    }

    .btn:hover .arrow { transform: translateX(3px); }

    .primary .arrow { color: rgba(247,242,234,.70); }

    .signature {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 22px 0 6px;
      color: rgba(91,58,46,.58);
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: .20em;
      text-transform: uppercase;
      text-align: center;
      animation: fadeUp 720ms 520ms ease both;
    }

    .signature::before,
    .signature::after {
      content: '';
      width: 28px;
      height: 1px;
      background: rgba(90,31,43,.16);
    }

    @keyframes ambientWine {
      0% { transform: translate(-50%, -50%) rotate(0deg) scale(1); opacity: .60; }
      100% { transform: translate(-48%, -52%) rotate(8deg) scale(1.08); opacity: .82; }
    }

    @keyframes cardEntrance {
      from { opacity: 0; transform: translateY(16px) scale(.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes drawLine {
      from { transform: translateX(-50%) scaleX(0); opacity: 0; }
      to { transform: translateX(-50%) scaleX(1); opacity: 1; }
    }

    @keyframes haloBreath {
      0%, 100% { opacity: .58; transform: translateY(-50%) scale(.96); }
      50% { opacity: .86; transform: translateY(-50%) scale(1.07); }
    }

    @keyframes slowPulse {
      0%, 100% { opacity: .45; transform: scale(.94); }
      50% { opacity: .72; transform: scale(1.06); }
    }

    @keyframes buttonSheen {
      0%, 38% { left: -55%; opacity: 0; }
      46% { opacity: .9; }
      62%, 100% { left: 115%; opacity: 0; }
    }

    @media (min-width: 700px) {
      body { padding: 40px 20px; }
      .shell { width: min(100%, 510px); }
      .card { padding: 32px 30px 28px; }
      .logo { width: min(82%, 330px); }
      .profile-card { grid-template-columns: 124px 1fr; gap: 20px; }
      .portrait-wrap { width: 124px; height: 148px; }
      .tagline { max-width: 390px; }
    }

    @media (min-width: 1024px) {
      .shell { width: min(100%, 540px); }
      .card { border-radius: 38px; padding: 36px 34px 30px; }
      .logo { width: min(80%, 350px); }
      .profile-card { grid-template-columns: 132px 1fr; padding: 16px; }
      .portrait-wrap { width: 132px; height: 156px; }
      .btn { min-height: 66px; }
    }

    @media (max-width: 520px) {
      body { align-items: flex-start; padding-top: max(16px, env(safe-area-inset-top)); padding-bottom: max(16px, env(safe-area-inset-bottom)); }
      .shell { width: min(100%, 440px); }
      .logo { width: min(88%, 292px); }
      .tagline { margin-bottom: 19px; }
    }

    @media (max-width: 390px) {
      body { padding-left: 11px; padding-right: 11px; }
      .card { padding: 20px 15px 18px; border-radius: 28px; }
      .logo { width: min(90%, 260px); }
      .profile-card { grid-template-columns: 92px 1fr; gap: 13px; padding: 12px; border-radius: 24px; }
      .profile-card::before { width: 150px; height: 150px; left: -35px; }
      .portrait-wrap { width: 92px; height: 112px; border-radius: 23px; }
      h1 { font-size: 1.95rem; }
      .eyebrow { font-size: .56rem; letter-spacing: .18em; gap: 6px; }
      .eyebrow::before { width: 16px; }
      .crbm { font-size: .56rem; letter-spacing: .18em; }
      .btn { grid-template-columns: 38px 1fr auto; min-height: 60px; border-radius: 20px; padding-right: 13px; }
      .icon { width: 38px; height: 38px; border-radius: 14px; }
      .btn-title { font-size: .66rem; letter-spacing: .10em; }
      .btn-subtitle { font-size: .70rem; }
    }

    @media (max-width: 330px) {
      .profile-card { grid-template-columns: 1fr; text-align: center; justify-items: center; }
      .eyebrow { justify-content: center; }
      .eyebrow::before { display: none; }
      .signature { letter-spacing: .14em; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
